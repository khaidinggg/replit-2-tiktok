kind = "web"
previewPath = "/"
title = "TikTok Search"
version = "1.0.0"
id = "artifacts/tiktok-search"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25981

[services.development]
run = "pnpm --filter @workspace/tiktok-search run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tiktok-search", "run", "build" ]
publicDir = "artifacts/tiktok-search/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25981"
BASE_PATH = "/"
